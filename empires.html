<style>

#minimap{width:132px;height:76px;clip-path:polygon(50% 0,100% 50%,50% 100%,0 50%)}
#barreHaut{position:fixed;top:6px;right:8px;display:flex;gap:6px;pointer-events:auto}

.confetti{position:fixed;font-size:26px;z-index:70;pointer-events:none;animation:tomber 2.2s ease-in forwards}
@keyframes tomber{0%{transform:translateY(-30px)}100%{transform:translateY(105vh) rotate(720deg);opacity:.2}}

<script>

// ══ DONNÉES ══
const PROFILS=[
 {id:'leana',emoji:'🌸',nom:'Léana',desc:'6 ans — guidée pas à pas',voix:1.25},
 {id:'mathias',emoji:'🔨',nom:'Mathias',desc:'10 ans — bâtisseur',voix:1.1},
 {id:'papa',emoji:'👑',nom:'Papa',desc:'stratège complet',voix:1.0}];
const DIFFICULTES=['baby','novice','normal','medium','pro','expert','hard','hardcore'];
const AGES=[
 {nom:'Préhistoire',emoji:'🪨',cout:{},teinte:'#7a6a52',histoire:'Il était une fois... l\'Homme ! Il y a très longtemps, nos ancêtres vivaient de chasse et de cueillette. Ils ont découvert le feu, taillé la pierre, peint les grottes de Lascaux. Récolte du bois et de la nourriture pour faire grandir ta tribu !'},
 {nom:'Antiquité',emoji:'🏛️',cout:{nour:150,bois:100},teinte:'#c9b178',histoire:'L\'Antiquité ! En Mésopotamie naît l\'écriture, en Égypte s\'élèvent les pyramides, à Athènes le peuple invente la démocratie et à Rome les légions bâtissent des routes. Ton village devient une cité !'},
 {nom:'Moyen Âge',emoji:'🏰',cout:{nour:300,bois:200,pierre:100},teinte:'#8a93a5',histoire:'Le Moyen Âge ! Châteaux forts, chevaliers, cathédrales... Pendant ce temps, l\'empire du Mali brille en Afrique et Byzance garde les savoirs anciens. Fortifie ta cité avec des tours et une caserne !'},
 {nom:'Renaissance',emoji:'⛵',cout:{nour:500,bois:300,pierre:200,or:50},teinte:'#b98d5e',histoire:'Il était une fois... les Découvreurs ! Colomb traverse l\'océan vers les Amériques où brillent déjà les cités mayas, aztèques et incas. Magellan fait le tour du monde, Gutenberg imprime les premiers livres, Léonard de Vinci dessine des machines volantes !'},
 {nom:'Industriel',emoji:'🏭',cout:{nour:800,bois:500,pierre:300,or:150},teinte:'#6d7b8d',histoire:'Il était une fois... les Inventeurs ! La machine à vapeur, le train, l\'électricité, le téléphone ! Pasteur vainc les microbes, Marie Curie découvre la radioactivité. Le monde s\'accélère — ta cité devient une capitale !'}];
const BATS={
 hdv:{nom:'Hôtel de ville',emoji:'🏛️',w:2,age:0,cout:{bois:200,pierre:100},pv:60,desc:'Forme des colons'},
 maison:{nom:'Maison',emoji:'🏠',w:1,age:0,cout:{bois:40},pv:20,desc:'+4 population'},
 ferme:{nom:'Ferme',emoji:'🌾',w:1,age:0,cout:{bois:50},pv:15,desc:'Produit la nourriture'},
 caserne:{nom:'Caserne',emoji:'⚔️',w:2,age:2,cout:{bois:120,pierre:80},pv:50,desc:'Forme des soldats'},
 tour:{nom:'Tour de garde',emoji:'🗼',w:1,age:2,cout:{pierre:60},pv:40,desc:'Défend la cité'},
 marche:{nom:'Marché',emoji:'⚖️',w:2,age:1,cout:{bois:100},pv:30,desc:'Produit de l\'or'},
 merveille:{nom:'Merveille',emoji:'🏆',w:3,age:3,cout:{bois:400,pierre:400,or:200},pv:100,desc:'La gloire de ta civilisation !'}};
const S={profil:null,diff:'normal',age:0,res:{bois:100,nour:100,pierre:50,or:0},pop:0,popMax:8,
 sel:null,placer:null,creatif:false,micro:false,quete:0,vagues:0};
const QUETES=[
 {txt:'👆 Clique sur un colon pour le sélectionner',test:()=>S.sel&&S.sel.type==='colon',dit:'Bienvenue chef ! Clique sur un de tes colons — les petits personnages près du feu de camp.'},
 {txt:'🌲 Envoie-le couper un arbre (clique sur une forêt)',test:()=>S.res.bois>=120,dit:'Ordonne-lui de couper du bois : clique sur un arbre. Le bois sert à tout construire !'},
 {txt:'🏠 Construis une maison (menu du bas)',test:()=>compteBat('maison')>=1,dit:'Construis une maison avec le menu en bas : un colon ira la bâtir planche par planche, comme dans une vraie colonie !'},
 {txt:'👶 Forme un nouveau colon (clique sur l\'Hôtel de ville)',test:()=>S.pop>=4,dit:'Clique sur ton Hôtel de ville et forme un nouveau colon. Plus de bras, plus de récoltes !'},
 {txt:'🌾 Construis une ferme pour la nourriture',test:()=>compteBat('ferme')>=1,dit:'Construis une ferme : la nourriture fait grandir la population.'},
 {txt:'🏛️ Passe à l\'Antiquité (bouton en haut à gauche)',test:()=>S.age>=1,dit:'Quand tu as assez de ressources, clique sur passer d\'âge, en haut à gauche. Chaque âge raconte une nouvelle histoire !'},
 {txt:'🏆 Continue jusqu\'à la Merveille ! (âges, marché, caserne...)',test:()=>compteBat('merveille')>=1,dit:'À toi de jouer : traverse les âges, bâtis un marché, une caserne, des tours... et un jour, ta Merveille !'}];

// ══ SPRITES PIXEL ART (procéduraux, palette rétro) ══
const MAP=44;
// ══ MOTEUR 3D ══
let scene,camera,renderer,rayc,solIM,selRing,sunRef;
const decors3D=new Map();
const cam={tx:22,tz:22};
const VD=16; // demi-hauteur du cadre ortho
function init3D(){
 if(scene)return;
 scene=new THREE.Scene();scene.background=new THREE.Color(0x101c30);
 renderer=new THREE.WebGLRenderer({antialias:true});
 renderer.setPixelRatio(Math.min(devicePixelRatio,1.6));
 renderer.setSize(innerWidth,innerHeight);
 renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;
 document.body.insertBefore(renderer.domElement,document.body.firstChild);
 camera=new THREE.OrthographicCamera(-VD*innerWidth/innerHeight,VD*innerWidth/innerHeight,VD,-VD,.1,200);
 scene.add(new THREE.HemisphereLight(0xc8d8ea,0x4a5f3d,.55));
 sunRef=new THREE.DirectionalLight(0xffeecb,1.0);
 sunRef.position.set(30,42,18);sunRef.castShadow=true;
 sunRef.shadow.mapSize.set(2048,2048);
 sunRef.shadow.camera.left=-30;sunRef.shadow.camera.right=30;
 sunRef.shadow.camera.top=30;sunRef.shadow.camera.bottom=-30;sunRef.shadow.camera.far=140;
 scene.add(sunRef);scene.add(sunRef.target);
 rayc=new THREE.Raycaster();
 selRing=new THREE.Mesh(new THREE.TorusGeometry(.55,.07,8,24),
  new THREE.MeshBasicMaterial({color:0xffd54f}));
 selRing.rotation.x=-Math.PI/2;selRing.visible=false;scene.add(selRing);
 initInput();
 addEventListener('resize',()=>{renderer.setSize(innerWidth,innerHeight);
  camera.left=-VD*innerWidth/innerHeight;camera.right=VD*innerWidth/innerHeight;
  camera.updateProjectionMatrix()})}
function majCamera(){
 camera.position.set(cam.tx+16,20,cam.tz+16);camera.lookAt(cam.tx,0,cam.tz);
 sunRef.position.set(cam.tx+18,34,cam.tz+8);sunRef.target.position.set(cam.tx,0,cam.tz)}
function M(geo,couleur){const m=new THREE.Mesh(geo,new THREE.MeshLambertMaterial({color:couleur}));
 m.castShadow=true;return m}
function px(g,x,y,w,h,c){g.fillStyle=c;g.fillRect(x,y,w,h)}
function spriteTuile(base,fonce,motif,dense){
 const c=document.createElement('canvas');c.width=TW;c.height=TH;const g=c.getContext('2d');
 g.beginPath();g.moveTo(TW/2,0);g.lineTo(TW,TH/2);g.lineTo(TW/2,TH);g.lineTo(0,TH/2);g.closePath();
 g.fillStyle=base;g.fill();
 g.save();g.clip();
 for(let i=0;i<(dense||70);i++){const r=Math.random();
  px(g,Math.random()*TW,Math.random()*TH,r<.3?3:2,2,r<.45?fonce:r<.85?motif:base)}
 // brins d'herbe / relief léger
 for(let i=0;i<10;i++)px(g,Math.random()*TW,Math.random()*TH,1,3,fonce);
 g.restore();return c}
function ombre(g,X,Y,w){g.fillStyle='rgba(0,0,0,.28)';g.beginPath();
 g.ellipse(X,Y,w,w*.42,0,0,7);g.fill()}
function spriteArbre(){
 const c=document.createElement('canvas');c.width=36;c.height=48;const g=c.getContext('2d');
 pxo(g,15,34,5,13,'#5d4037');px(g,15,34,2,13,'#7a5647'); // tronc ombré
 px(g,11,32,4,4,'#4e342e');px(g,20,33,4,3,'#4e342e'); // racines
 const grappes=[[17,14,13,'#1e4d20'],[10,20,9,'#2a6330'],[25,19,9,'#2a6330'],
  [13,10,8,'#3d8a40'],[22,9,8,'#3d8a40'],[17,16,7,'#57a65c'],[19,6,5,'#6cbf70']];
 for(const[cx,cy,r,col]of grappes){g.fillStyle=col;g.beginPath();g.arc(cx,cy,r,0,7);g.fill()}
 for(let i=0;i<14;i++)px(g,8+Math.random()*20,4+Math.random()*22,2,2,'#77c97c'); // reflets
 return c}
function spritePin(){ // pin sombre AoE2
 const c=document.createElement('canvas');c.width=28;c.height=48;const g=c.getContext('2d');
 px(g,12,38,4,10,'#4e342e');
 for(let i=0;i<5;i++){const w=22-i*4,y=32-i*7;
  g.fillStyle=i%2?'#1b3d1a':'#14421f';
  g.beginPath();g.moveTo(14,y-8);g.lineTo(14+w/2,y);g.lineTo(14-w/2,y);g.closePath();g.fill()}
 return c}
function spritePalmier(){
 const c=document.createElement('canvas');c.width=36;c.height=48;const g=c.getContext('2d');
 for(let i=0;i<7;i++)px(g,16+Math.sin(i*.5)*3,42-i*5,4,6,'#8d6e4b');
 g.strokeStyle='#3f9142';g.lineWidth=3;
 for(const a of[-2.6,-2,-1.2,-.5,.3,1])
  {g.beginPath();g.moveTo(19,10);g.quadraticCurveTo(19+Math.cos(a)*13,8+Math.sin(a)*9,19+Math.cos(a)*17,12+Math.sin(a)*13);g.stroke()}
 px(g,17,7,5,5,'#6d4c2f');return c}
function spriteBuisson(){
 const c=document.createElement('canvas');c.width=20;c.height=14;const g=c.getContext('2d');
 px(g,2,6,16,8,'#2e6b30');px(g,5,2,10,7,'#3d8a40');px(g,8,4,3,3,'#c62828');return c}
function spriteGazelle(frame){
 const c=document.createElement('canvas');c.width=30;c.height=24;const g=c.getContext('2d');
 const f=frame?2:0;
 pxo(g,5,9,16,7,'#c99b64');px(g,5,13,16,3,'#f5efe0'); // corps + ventre blanc
 pxo(g,19,4,5,7,'#c99b64'); // cou
 pxo(g,21,2,6,4,'#b3874f'); // tête
 px(g,26,3,2,2,'#2d2d2d'); // museau
 px(g,22,0,1,3,'#6d4c2f');px(g,25,0,1,3,'#6d4c2f'); // cornes
 px(g,20,1,2,2,'#a87f4f'); // oreille
 px(g,3,8,3,3,'#f5efe0');px(g,2,9,2,4,'#b3874f'); // queue+croupe
 pxo(g,6+f,16,2,6,'#a87f4f');pxo(g,11-f,16,2,6,'#a87f4f'); // pattes avant/arrière alternées
 pxo(g,15+f,16,2,6,'#a87f4f');pxo(g,19-f,16,2,6,'#a87f4f');
 return c}
function spriteForum(){ // forum âge de pierre : défenses de mammouth + feu + peaux
 const c=document.createElement('canvas');c.width=96;c.height=74;const g=c.getContext('2d');
 g.strokeStyle='#e8e0cc';g.lineWidth=4;
 g.beginPath();g.arc(28,52,20,Math.PI,Math.PI*1.6);g.stroke(); // défense gauche
 g.beginPath();g.arc(68,52,20,Math.PI*1.4,Math.PI*2);g.stroke(); // défense droite
 px(g,40,54,16,8,'#5d4037');px(g,43,44,10,10,'#ff7043');px(g,46,38,4,8,'#ffca28'); // feu
 px(g,8,58,18,10,'#8d6e4b');px(g,70,58,18,10,'#a87f4f'); // peaux au sol
 g.strokeStyle='#d7ccb0';g.lineWidth=3;
 g.beginPath();g.moveTo(14,64);g.lineTo(10,44);g.stroke();g.beginPath();g.moveTo(84,64);g.lineTo(88,46);g.stroke(); // os plantés
 px(g,30,20,6,26,'#6d4c2f');px(g,26,14,14,8,'#c62828'); // totem bannière
 return c}
function spriteRocher(or){
 const c=document.createElement('canvas');c.width=32;c.height=26;const g=c.getContext('2d');
 px(g,4,10,24,14,or?'#8d6e63':'#78909c');px(g,8,6,16,10,or?'#a1887f':'#90a4ae');
 if(or){px(g,12,10,4,4,'#ffd54f');px(g,20,14,3,3,'#ffd54f');px(g,8,16,3,3,'#ffe082')}
 else px(g,10,8,5,4,'#b0bec5');return c}
function spriteBat(id,ageT){
 if(id==='hdv'&&S.age===0)return spriteForum(); // âge de pierre : forum à ossements
 const B=BATS[id],w=B.w*TW*.8,h=B.w*38+18;
 const c=document.createElement('canvas');c.width=w;c.height=h;const g=c.getContext('2d');
 const colombage=S.age>=2&&(id==='maison'||id==='hdv');
 const mur=colombage?'#efe6d0':(ageT||'#c9b178'),toit=id==='merveille'?'#ffd54f':'#8d3b2f',fonce='#00000044';
 if(id==='ferme'){for(let i=0;i<4;i++)px(g,4,h-14-i*7,w-8,5,i%2?'#e9c94a':'#c9a227');
  px(g,2,h-8,w-4,6,'#795548');return c}
 if(id==='tour'){px(g,w/2-9,14,18,h-18,mur);px(g,w/2-12,8,24,10,'#78909c');
  px(g,w/2-10,4,5,6,'#78909c');px(g,w/2+5,4,5,6,'#78909c');px(g,w/2-4,h-22,8,10,fonce);return c}
 const bh=h*.55;
 px(g,3,h-bh,w-6,bh,mur);
 if(colombage){g.fillStyle='#5d4037'; // poutres colombage

let carte=[];
function bruit(x,z,f,s){return Math.sin(x*f+s)*Math.cos(z*f*1.3+s*2)+Math.sin((x+z)*f*.6+s*3)*.5}
function genCarte(){
 carte=[];
 for(let y=0;y<MAP;y++){const l=[];
  for(let x=0;x<MAP;x++){
   const b=bruit(x,y,.16,7),c2=bruit(x,y,.3,42);
   let t='herbe';
   if(b<-1.15)t='eau';else if(b<-0.95)t='sable';
   else if(c2>1.1)t='foret';else if(c2<-1.25)t='roche';
   else if(b>1.25&&c2>0.4)t='or';
   const cell={t,res:t==='foret'?60:t==='roche'?80:t==='or'?50:0,bat:null};
   const hash=(x*7+y*13)%19;
   const gv=bruit(x,y,.09,23); // taches AoE : herbe verte / sèche / terre
   cell.gv=gv>0.85?1:gv<-1.05?2:0;
   if(Math.hypot(x-22,y-22)<4.5)cell.gv=2; // terre battue autour du camp
   if(t==='foret')cell.v=hash%3===0?'arbre':hash%3===1?'pin':(b<-.5?'palmier':'pin');
   if(t==='herbe'&&hash===5&&(x*3+y*5)%11===0)cell.dec='buisson';
   if(t==='sable'&&hash%6===0)cell.dec='palmier';
   l.push(cell)}
  carte.push(l)}
 // gazelles
 animaux.length=0;
 for(let i=0;i<6;i++)animaux.push({x:8+Math.random()*30,y:8+Math.random()*30,cible:null,pause:Math.random()*4})
 // clairière de départ au centre
 for(let y=18;y<27;y++)for(let x=18;x<27;x++){carte[y][x].t='herbe';carte[y][x].res=0;carte[y][x].bat=null}
 // garantir ressources proches
 carte[17][20].t='foret';carte[17][20].res=60;carte[17][21].t='foret';carte[17][21].res=60;
 carte[26][19].t='roche';carte[26][19].res=80;carte[25][26].t='or';carte[25][26].res=50}

  for(const b of batiments){const d=(b.x-u.x)**2+(b.y-u.y)**2;if(d<bd){bd=d;bb=b}}
  const sold=unites.find(s=>s.type==='soldat'&&Math.hypot(s.x-u.x,s.y-u.y)<1.2);
  if(sold){sold.pv-=4*dt;u.pv-=6*dt;if(u.pv<=0)mortUnite(u);if(sold.pv<=0)mortUnite(sold);return}
  if(bb){if(bd>1.4)u.cible=[bb.x+.5,bb.y+.5];
   else{bb.pv-=2*dt;if(bb.pv<=0)detruireBat(bb)}}
  return}
 if(u.type==='soldat'){ // intercepte les barbares
  const bar=unites.find(b2=>b2.type==='barbare');
  if(bar&&u.tache==='garde'){const d=Math.hypot(bar.x-u.x,bar.y-u.y);
   if(d>1)u.cible=[bar.x,bar.y]}
  return}
 // colon
 if(u.tache==='recolte'&&u.rc){
  const[tx,ty]=u.rc,c=carte[ty]&&carte[ty][tx];
  if(!c||c.res<=0){u.tache='idle';u.rc=null;return}
  if(Math.hypot(tx+.5-u.x,ty+.5-u.y)>.9){u.cible=[tx+.5,ty+.5];return}
  if(u.sac>=10){ // dépose au HDV
   const hdv=batiments.find(b=>b.id==='hdv'&&b.fini);
   if(hdv){if(Math.hypot(hdv.x+1-u.x,hdv.y+1-u.y)>1.4){u.cible=[hdv.x+1,hdv.y+1];return}
    S.res[u.sacType]+=u.sac;u.sac=0;majRes();verifQuete()}
   return}
  u.sac+=dt*3;u.sacType=c.t==='foret'?'bois':c.t==='or'?'or':'pierre';c.res-=dt*3;
  if(c.res<=0){c.t=c.t==='foret'?'herbe':'sable';c.res=0;c.v=null;c.dec=null;majTuile(tx,ty)}
  return}
 if(u.tache==='champ'){
  const f=batiments.find(b=>b.id==='ferme'&&b.fini);
  if(!f){u.tache='idle';return}
  if(Math.hypot(f.x+.5-u.x,f.y+.5-u.y)>.9){u.cible=[f.x+.5,f.y+.5];return}
  S.res.nour+=dt*2.4;majRes();return}
 if(u.tache==='chantier'){
  const b=batiments.find(b2=>!b2.fini);
  if(!b){u.tache='idle';return}
  if(Math.hypot(b.x+.5-u.x,b.y+.5-u.y)>1.2){u.cible=[b.x+.5,b.y+.5];return}
  b.prog+=dt*14;majProgres(b);
  if(b.prog>=100){b.fini=true;u.tache='idle';son(700);majProgres(b);toast('✅ '+BATS[b.id].nom+' terminé !');
   if(b.id==='maison'){S.popMax+=4;majRes()}
   if(b.id==='merveille'){confettis();parler('MERVEILLE ! Ta civilisation entre dans la légende ! Bravo, immense chef !',true)}
   verifQuete()}
  return}}
function mortUnite(u){const i=unites.indexOf(u);if(i>=0)unites.splice(i,1);
 if(u.mesh)scene.remove(u.mesh);
 if(S.sel===u){S.sel=null;majActions()}
 if(u.type!=='barbare'){S.pop--;majRes()}}
function detruireBat(b){const i=batiments.indexOf(b);if(i>=0)batiments.splice(i,1);
 if(b.mesh)scene.remove(b.mesh);
 if(S.sel===b){S.sel=null;majActions()}
 for(let y=0;y<MAP;y++)for(let x=0;x<MAP;x++)if(carte[y][x].bat===b)carte[y][x].bat=null;
 toast('💥 '+BATS[b.id].nom+' détruit !')}
function tickEco(dt){
 // marché produit de l'or, tours tirent sur les barbares
 for(const b of batiments){
  if(!b.fini)continue;
  if(b.id==='marche')S.res.or+=dt*.5;
  if(b.id==='tour'){const bar=unites.find(u=>u.type==='barbare'&&Math.hypot(u.x-b.x,u.y-b.y)<5);
   if(bar){bar.pv-=dt*5;if(bar.pv<=0)mortUnite(bar)}}}
 // vagues barbares (à partir du Moyen Âge, jamais en baby/novice)
 if(S.age>=2&&!['baby','novice'].includes(S.diff)){
  S.vagues+=dt;
  const freq=180-DIFFICULTES.indexOf(S.diff)*12;
  if(S.vagues>freq){S.vagues=0;
   const n=1+Math.floor(DIFFICULTES.indexOf(S.diff)/3);
   for(let i=0;i<n;i++)creerUnite('barbare',2+i,2);
   parler('Attention ! Des pillards approchent du nord ! Tes soldats et tes tours vont défendre la cité !',true);
   toast('⚠️ Pillards au nord !')}}
 majRes()}

function clic(sx,sy,droit){
 const ndc=new THREE.Vector2(sx/innerWidth*2-1,-(sy/innerHeight)*2+1);
 rayc.setFromCamera(ndc,camera);
 // unités visées ?
 if(!S.placer&&!S.creatif){
  const uM=unites.filter(u=>u.mesh&&u.type!=='barbare').map(u=>u.mesh);
  const hu=rayc.intersectObjects(uM,true)[0];
  if(hu){let o=hu.object;while(o&&!o.userData.unite)o=o.parent;
   if(o){S.sel=o.userData.unite;son(660);majActions();verifQuete();return}}}
 // sol (plan y=0)
 const pt=new THREE.Vector3();
 rayc.ray.intersectPlane(new THREE.Plane(new THREE.Vector3(0,1,0),0),pt);
 if(!pt)return;
 const tx=Math.round(pt.x),ty=Math.round(pt.z);
 if(tx<0||ty<0||tx>=MAP||ty>=MAP)return;
 const c=carte[ty][tx];
 // pose de bâtiment
 if(S.placer){
  const B=BATS[S.placer];
  if(!tuileLibre(tx,ty,B.w)){toast('❌ Terrain occupé — choisis de l\'herbe libre');return}
  if(!S.creatif&&!payer(B.cout)){toast('❌ Ressources insuffisantes');return}
  const b=creerBat(S.placer,tx,ty,S.creatif);
  if(!S.creatif){const col=unites.find(u=>u.type==='colon'||u.type==='colonne');
   if(col){col.tache='chantier';col.cible=[tx+.5,ty+.5]}
   parler('Chantier lancé ! Un colon vient construire, pierre par pierre.')}
  son(600);S.placer=null;majActions();verifQuete();return}
 // mode créatif : terraformer
 if(S.creatif){
  if(droit){c.t='eau';c.res=0;c.v=null;c.dec=null;majTuile(tx,ty)}
  else{const cycle=['herbe','foret','roche','or','sable'];
   c.t=cycle[(cycle.indexOf(c.t)+1)%cycle.length];c.res=c.t==='foret'?60:c.t==='roche'?80:c.t==='or'?50:0;
   c.v=c.t==='foret'?'arbre':null;c.dec=null;majTuile(tx,ty)}
  son(500);return}
 // clic sur bâtiment ?
 if(c.bat){S.sel=c.bat;son(660);majActions();return}
 // ordre à l'unité sélectionnée
 if(S.sel&&S.sel.type&&(S.sel.type==='colon'||S.sel.type==='colonne')){
  if(c.t==='foret'||c.t==='roche'||c.t==='or'){S.sel.tache='recolte';S.sel.rc=[tx,ty];S.sel.cible=[tx+.5,ty+.5];
   toast('⛏️ Au travail !');son(520);verifQuete();return}
  if(c.bat&&c.bat.id==='ferme'&&c.bat.fini){S.sel.tache='champ';toast('🌾 Aux champs !');return}
  S.sel.tache='idle';S.sel.cible=[tx+.5,ty+.5];son(480);return}
 if(S.sel&&S.sel.type==='soldat'){S.sel.cible=[tx+.5,ty+.5];S.sel.tache='garde';return}}

 for(const a of animaux){const[ix,iy]=iso(a.x-.5,a.y-.5);

   const X=ix+cam.x,Y=iy+cam.y;
   ombre(g,X,Y+TH/2-2,sp.width*.42);

   if(!b.fini){px(g,X-24,Y+6,48,6,'#00000088');px(g,X-23,Y+7,46*b.prog/100,4,'#3dba6f')}
   if(S.sel===b){g.strokeStyle='#e8a33d';g.lineWidth=2;g.strokeRect(X-sp.width/2,Y-sp.height+TH/2,sp.width,sp.height)}}
  else{const u=o.u,[ix,iy]=iso(u.x-.5,u.y-.5),X=ix+cam.x,Y=iy+cam.y;

   if(u.sac>0)px(g,X-2,Y-24+bob,5,4,u.sacType==='bois'?'#8d6e63':u.sacType==='or'?'#ffd54f':'#90a4ae');
   if(S.sel===u){g.strokeStyle='#e8a33d';g.lineWidth=2;g.beginPath();g.ellipse(X,Y+4,12,6,0,0,7);g.stroke()}}}
 // feu de camp au centre de départ

let audioCtx;

 const o=audioCtx.createOscillator(),g2=audioCtx.createGain();o.connect(g2);g2.connect(audioCtx.destination);
 o.frequency.value=f;g2.gain.setValueAtTime(.1,audioCtx.currentTime);
 g2.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+.22);o.start();o.stop(audioCtx.currentTime+.22)}catch(e){}}
function parler(txt,maestro){try{speechSynthesis.cancel();
 const u=new SpeechSynthesisUtterance(txt);u.lang='fr-FR';
 const v=speechSynthesis.getVoices().filter(x=>x.lang.startsWith('fr'));
 if(maestro){u.rate=.85;u.pitch=.9;u.voice=v.find(x=>/henri|paul|thierry|male/i.test(x.name))||v[0]}
 else{u.rate=.95;u.voice=v.find(x=>/denise|eloise|female/i.test(x.name))||v[0]}
 speechSynthesis.speak(u)}catch(e){}}

  document.getElementById('btnJouer').disabled=!S.profil};parent.appendChild(d)}
PROFILS.forEach(p=>carte2(document.getElementById('profils'),
 '<div class="emoji">'+p.emoji+'</div><div class="nom">'+p.nom+'</div><div class="desc">'+p.desc+'</div>',()=>S.profil=p.id,'carte'));
DIFFICULTES.forEach(d=>carte2(document.getElementById('difficultes'),d,()=>S.diff=d,'pill'));
document.getElementById('btnJouer').onclick=()=>{
 document.getElementById('ecranTitre').classList.add('hidden');
 document.getElementById('ui').classList.remove('hidden');
 if(!enJeu&&unites.length===0){
  init3D();genCarte();initSprites();
  creerBat('hdv',20,20,true);
  creerUnite('colon',22.5,22.5);creerUnite('colonne',21.5,23);creerUnite('colon',23,21.5);
  cam.tx=22;cam.tz=22;majCamera()}
 enJeu=true;majRes();majActions();majObjectif();
 setTimeout(()=>{parler('Bienvenue, chef '+(PROFILS.find(p=>p.id===S.profil)||{}).nom+' !',false);
  setTimeout(maestroHistoire,1800)},400)};
let tPrec=0;
function boucle(t){requestAnimationFrame(boucle);
 const dt=Math.min(.05,(t-tPrec)/1000||.016);tPrec=t;
 if(!enJeu)return;
 for(const u of unites)tickUnite(u,dt);
 tickAnimaux(dt);tickEco(dt);rendre();
 if(!boucle.mm||performance.now()-boucle.mm>800){boucle.mm=performance.now();rendreMinimap()}}
function rendreMinimap(){
 const m=document.getElementById('minimap');if(!m)return;
 const g=m.getContext('2d');g.clearRect(0,0,132,76);
 const cols={herbe:'#4a8f3c',foret:'#1b5e20',eau:'#2874c9',sable:'#d9c47e',roche:'#78909c',or:'#ffd54f'};
 for(let y=0;y<MAP;y++)for(let x=0;x<MAP;x++){
  const sx=66+(x-y)*1.5,sy=(x+y)*76/(MAP*2);
  g.fillStyle=cols[carte[y][x].t]||'#4a8f3c';g.fillRect(sx,sy,2,2)}
 for(const b of batiments){const sx=66+(b.x-b.y)*1.5,sy=(b.x+b.y)*76/(MAP*2);
  g.fillStyle='#fff';g.fillRect(sx-1,sy-1,3,3)}
 for(const u of unites){const sx=66+(u.x-u.y)*1.5,sy=(u.x+u.y)*76/(MAP*2);
  g.fillStyle=u.type==='barbare'?'#e53935':'#40c4ff';g.fillRect(sx,sy,2,2)}}
boucle();
speechSynthesis&&speechSynthesis.getVoices();
if(location.search.includes('test=1')){S.profil='papa';
 setTimeout(()=>{document.getElementById('btnJouer').disabled=false;document.getElementById('btnJouer').click()},200)}

</script>
